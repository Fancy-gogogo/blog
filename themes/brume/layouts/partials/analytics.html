{{/* Baidu Analytics */}}
{{ with .Site.Params.baiduAnalytics }}
<script async src="https://hm.baidu.com/hm.js?{{ . }}"></script>
{{ end }}

{{/* Google Analytics GA4 */}}
{{ with .Site.Params.googleAnalytics }}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ . }}"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', '{{ . }}');
</script>
{{ end }}

{{/* Umami */}}
{{ with .Site.Params.umamiWebsiteId }}
<script async src="{{ $.Site.Params.umamiScriptUrl | default "https://analytics.umami.is/script.js" }}" data-website-id="{{ . }}"></script>
{{ end }}
